services:
  site1:
    image: postgres:17
    container_name: warehouse_site1
    environment:
      POSTGRES_DB: warehouse_north
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_site1_data:/var/lib/postgresql/data

  site2:
    image: postgres:17
    container_name: warehouse_site2
    environment:
      POSTGRES_DB: warehouse_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg_site2_data:/var/lib/postgresql/data

  site3:
    image: postgres:17
    container_name: warehouse_site3
    environment:
      POSTGRES_DB: warehouse_south
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pg_site3_data:/var/lib/postgresql/data

volumes:
  pg_site1_data:
  pg_site2_data:
  pg_site3_data:
